<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiagMob - Équipage covoiturage</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }

    .app {
      display: grid;
      grid-template-columns: 360px 1fr;
      height: 100vh;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: white;
      overflow-y: auto;
      box-shadow: 2px 0 8px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: white;
      padding: 20px;
    }

    .sidebar-header h1 {
      font-size: 1.1em;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .sidebar-header .eq-id {
      font-size: 0.85em;
      opacity: 0.85;
      font-family: monospace;
    }

    .sidebar-body { padding: 16px; flex: 1; }

    /* Jours communs */
    .jours-badge {
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 0.9em;
    }

    .jours-badge .label {
      color: #388e3c;
      font-weight: 600;
      display: block;
      margin-bottom: 4px;
      font-size: 0.8em;
      text-transform: uppercase;
    }

    .jours-badge .value {
      color: #1b5e20;
      font-weight: 700;
      font-size: 1em;
    }

    /* Membre cards */
    .membre-card {
      border-radius: 10px;
      border: 2px solid;
      padding: 14px;
      margin-bottom: 12px;
      position: relative;
    }

    .membre-card .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
      vertical-align: middle;
      flex-shrink: 0;
    }

    .membre-card .name {
      font-weight: 700;
      font-size: 1em;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }

    .membre-card .email {
      font-size: 0.8em;
      color: #555;
      margin-bottom: 10px;
      word-break: break-all;
    }

    .membre-infos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .info-item {
      background: #f8f9fa;
      border-radius: 6px;
      padding: 7px 10px;
    }

    .info-item .key {
      font-size: 0.7em;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .info-item .val {
      font-size: 0.85em;
      font-weight: 600;
      color: #333;
      margin-top: 2px;
    }

    /* Lien GMaps */
    .gmaps-btn {
      display: block;
      text-align: center;
      background: #1a73e8;
      color: white;
      text-decoration: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9em;
      margin-top: 16px;
    }

    .gmaps-btn:hover { background: #1558b0; }

    /* Loading / error */
    .state-box {
      padding: 40px 20px;
      text-align: center;
      color: #666;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 4px solid #e0e0e0;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #fdecea;
      border: 1px solid #f5c6c6;
      border-radius: 8px;
      padding: 16px;
      color: #c62828;
      margin: 16px;
      font-size: 0.9em;
    }

    /* ── MAP ── */
    #map { height: 100vh; }

    /* Popup Leaflet */
    .popup-content { font-size: 0.9em; line-height: 1.5; }
    .popup-content strong { font-size: 1em; }

    /* Legend */
    .legend {
      background: white;
      padding: 12px 16px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      font-size: 0.85em;
    }

    .legend h4 { margin-bottom: 8px; color: #333; font-size: 0.9em; }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .legend-line {
      width: 24px; height: 4px;
      border-radius: 2px;
    }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; grid-template-rows: auto 60vh; }
      #map { height: 60vh; }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>Équipage de covoiturage</h1>
      <div class="eq-id" id="eq-id-display">Chargement...</div>
    </div>
    <div class="sidebar-body" id="sidebar-body">
      <div class="state-box">
        <div class="spinner"></div>
        <p>Chargement des données...</p>
      </div>
    </div>
  </div>

  <!-- CARTE -->
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@mapbox/polyline@1.1.1/src/polyline.js"></script>

<script>
// ═══════════════════════════════════════════════
// CONFIG GRIST — à adapter si besoin
// ═══════════════════════════════════════════════
const GRIST = {
  server:    'https://grist.incubateur.dnum.din.developpement-durable.gouv.fr',
  docId:     'cfiCVUp2f85MBLuwwzUiGV',
  tableName: 'DiagmobV2',
  apiKey:    '63ce4c8526f497008a25ce60f8306bfb3bef3b94'
};

// Couleurs membres : rouge, orange, vert, bleu
const COLORS     = ['#dc3545', '#fd7e14', '#198754', '#0d6efd'];
const COLORS_BG  = ['#fdecea', '#fff3e0', '#e8f5e9', '#e3f2fd'];
const COLORS_BD  = ['#f5c6c6', '#ffd699', '#a5d6a7', '#90caf9'];

// ═══════════════════════════════════════════════
// PARAMÈTRES URL
// ═══════════════════════════════════════════════
const params   = new URLSearchParams(window.location.search);
const agentIds = (params.get('agents') || '').split(',').map(Number).filter(Boolean);
const eqId     = params.get('eq_id') || '';
const jours    = params.get('jours') || '';

if (agentIds.length === 0) {
  document.getElementById('sidebar-body').innerHTML = `
    <div class="error-box">
      <strong>Aucun agent spécifié.</strong><br>
      Format attendu : <code>?agents=20,25&eq_id=COV-C01-01</code>
    </div>`;
}

// ═══════════════════════════════════════════════
// INITIALISATION CARTE
// ═══════════════════════════════════════════════
const map = L.map('map').setView([46.6, 1.9], 6);

L.tileLayer('https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19
}).addTo(map);

// ═══════════════════════════════════════════════
// CHARGEMENT & AFFICHAGE
// ═══════════════════════════════════════════════
async function init() {
  if (agentIds.length === 0) return;

  try {
    const url = `${GRIST.server}/api/docs/${GRIST.docId}/tables/${GRIST.tableName}/records`;
    const res = await fetch(url, { headers: { 'Authorization': `Bearer ${GRIST.apiKey}` } });
    if (!res.ok) throw new Error(`Erreur Grist ${res.status}`);

    const data   = await res.json();
    const agents = data.records
      .filter(r => agentIds.includes(r.id))
      .map(r => ({ id: r.id, ...r.fields }));

    if (agents.length === 0) throw new Error('Aucun agent trouvé pour ces IDs');

    afficherEquipage(agents);
  } catch (err) {
    document.getElementById('sidebar-body').innerHTML =
      `<div class="error-box"><strong>Erreur de chargement</strong><br>${err.message}</div>`;
  }
}

function afficherEquipage(agents) {
  // En-tête
  document.getElementById('eq-id-display').textContent =
    eqId || `Équipage ${agents.length} membres`;

  const bounds = L.latLngBounds([]);
  const legendItems = [];
  let gMapsUrl = null;
  const sidebarParts = [];

  // Jours communs (depuis URL ou calculé)
  if (jours) {
    sidebarParts.push(`
      <div class="jours-badge">
        <span class="label">Jours en commun</span>
        <span class="value">${jours}</span>
      </div>`);
  }

  // Marqueur travail partagé (premier agent avec coordonnées)
  const travAgent = agents.find(a => a.GPS_Trav_Lat && a.GPS_Trav_Lon);
  if (travAgent) {
    const lat = parseFloat(travAgent.GPS_Trav_Lat);
    const lon = parseFloat(travAgent.GPS_Trav_Lon);
    if (isFinite(lat) && isFinite(lon)) {
      L.marker([lat, lon], { icon: buildIcon('🏢', '#333') })
        .addTo(map)
        .bindPopup('<div class="popup-content"><strong>🏢 Lieu de travail</strong></div>');
      bounds.extend([lat, lon]);
    }
  }

  // Waypoints pour Google Maps (domiciles + travail)
  const gMapsWaypoints = [];

  agents.forEach((agent, i) => {
    const color   = COLORS[i % COLORS.length];
    const colorBg = COLORS_BG[i % COLORS_BG.length];
    const colorBd = COLORS_BD[i % COLORS_BD.length];

    const prenom   = agent.Prenom_Nom || agent.prenom || agent.Email_Pro || `Membre ${i+1}`;
    const email    = agent.Email_Pro || '';
    const service  = agent.Service || '';
    const jSite    = agent.Jours_Presence || 'N/A';
    const hArr     = agent.Heure_Arrivee || 'N/A';
    const hDep     = agent.Heure_Depart  || 'N/A';
    const distKm   = agent.Distance_Voiture_km || '';

    // ── Trajet voiture (polyline)
    const poly = agent.Trajet_Voiture_Polyline;
    if (poly) {
      try {
        const coords = polyline.decode(poly);  // [[lat,lon], ...]
        const line = L.polyline(coords, { color, weight: 5, opacity: 0.75 }).addTo(map);
        bounds.extend(line.getBounds());
        legendItems.push({ color, label: `Trajet ${prenom.split(' ')[0]}` });
      } catch(e) { /* polyline invalide */ }
    }

    // ── Marqueur domicile
    const lat = parseFloat(agent.GPS_Dom_Lat);
    const lon = parseFloat(agent.GPS_Dom_Lon);
    if (isFinite(lat) && isFinite(lon)) {
      L.marker([lat, lon], { icon: buildIcon('🏠', color) })
        .addTo(map)
        .bindPopup(`
          <div class="popup-content">
            <strong style="color:${color}">🏠 ${prenom}</strong><br>
            ${email}<br>
            <em>${service}</em><br>
            📅 ${jSite}<br>
            🕐 Arrivée : ${hArr} — Départ : ${hDep}
          </div>`);
      bounds.extend([lat, lon]);
      gMapsWaypoints.push(`${lat.toFixed(5)},${lon.toFixed(5)}`);
    }

    // ── Card membre dans sidebar
    sidebarParts.push(`
      <div class="membre-card" style="border-color:${colorBd}; background:${colorBg};">
        <div class="name">
          <span class="dot" style="background:${color};"></span>
          ${prenom}
        </div>
        <div class="email">${email}</div>
        <div class="membre-infos">
          <div class="info-item" style="grid-column:1/-1;">
            <div class="key">Jours sur site</div>
            <div class="val">${jSite}</div>
          </div>
          <div class="info-item">
            <div class="key">Arrivée</div>
            <div class="val">${hArr}</div>
          </div>
          <div class="info-item">
            <div class="key">Départ</div>
            <div class="val">${hDep}</div>
          </div>
          ${service ? `<div class="info-item" style="grid-column:1/-1;"><div class="key">Service</div><div class="val">${service}</div></div>` : ''}
          ${distKm ? `<div class="info-item" style="grid-column:1/-1;"><div class="key">Distance domicile–travail</div><div class="val">${distKm} km</div></div>` : ''}
        </div>
      </div>`);
  });

  // Bouton Google Maps
  if (travAgent) {
    const lat = parseFloat(travAgent.GPS_Trav_Lat);
    const lon = parseFloat(travAgent.GPS_Trav_Lon);
    if (isFinite(lat) && isFinite(lon)) {
      gMapsWaypoints.push(`${lat.toFixed(5)},${lon.toFixed(5)}`);
    }
  }
  if (gMapsWaypoints.length >= 2) {
    gMapsUrl = `https://www.google.com/maps/dir/${gMapsWaypoints.join('/')}`;
    sidebarParts.push(`
      <a class="gmaps-btn" href="${gMapsUrl}" target="_blank" rel="noopener">
        🗺️ Voir le trajet sur Google Maps
      </a>`);
  }

  document.getElementById('sidebar-body').innerHTML = sidebarParts.join('');

  // Ajuster la vue sur les trajets
  if (bounds.isValid()) {
    map.fitBounds(bounds, { padding: [50, 50] });
  }

  // Légende
  if (legendItems.length > 0) {
    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = () => {
      const div = L.DomUtil.create('div', 'legend');
      div.innerHTML = '<h4>Trajets domicile–travail</h4>';
      legendItems.forEach(({ color, label }) => {
        div.innerHTML += `
          <div class="legend-item">
            <div class="legend-line" style="background:${color}"></div>
            <span>${label}</span>
          </div>`;
      });
      div.innerHTML += `
        <div class="legend-item" style="margin-top:6px;">
          <span>🏠</span><span>Domicile</span>
        </div>
        <div class="legend-item">
          <span>🏢</span><span>Lieu de travail</span>
        </div>`;
      return div;
    };
    legend.addTo(map);
  }
}

// Icône emoji colorée
function buildIcon(emoji, color) {
  return L.divIcon({
    html: `<div style="
      background:white;
      border:3px solid ${color};
      border-radius:50%;
      width:32px; height:32px;
      display:flex; align-items:center; justify-content:center;
      font-size:16px;
      box-shadow:0 2px 6px rgba(0,0,0,0.3);
    ">${emoji}</div>`,
    className: '',
    iconSize: [32, 32],
    iconAnchor: [16, 16],
    popupAnchor: [0, -18]
  });
}

init();
</script>
</body>
</html>
