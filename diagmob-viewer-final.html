<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiagMob - Équipage covoiturage</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #f0f2f5;
    }

    .app {
      display: grid;
      grid-template-columns: 360px 1fr;
      height: 100vh;
    }

    .sidebar {
      background: white;
      overflow-y: auto;
      box-shadow: 2px 0 8px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: white;
      padding: 20px;
      flex-shrink: 0;
    }

    .sidebar-header h1 { font-size: 1.1em; font-weight: 700; margin-bottom: 4px; }
    .sidebar-header .eq-id { font-size: 0.82em; opacity: 0.85; font-family: monospace; }

    .sidebar-body { padding: 16px; flex: 1; }

    .jours-badge {
      background: #e8f5e9; border: 1px solid #a5d6a7;
      border-radius: 8px; padding: 10px 14px; margin-bottom: 16px;
    }
    .jours-badge .lbl {
      color: #388e3c; font-weight: 600; font-size: 0.75em;
      text-transform: uppercase; letter-spacing: 0.4px; display: block; margin-bottom: 3px;
    }
    .jours-badge .val { color: #1b5e20; font-weight: 700; font-size: 0.95em; }

    .membre-card {
      border-radius: 10px; border: 2px solid; padding: 14px; margin-bottom: 12px;
    }
    .membre-card .name {
      font-weight: 700; font-size: 1em; color: #1a1a2e;
      display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
    }
    .dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
    .membre-card .email { font-size: 0.78em; color: #555; margin-bottom: 10px; word-break: break-all; }

    .infos { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .info-item { background: #f8f9fa; border-radius: 6px; padding: 7px 10px; }
    .info-item .k { font-size: 0.68em; color: #888; text-transform: uppercase; letter-spacing: 0.3px; }
    .info-item .v { font-size: 0.85em; font-weight: 600; color: #333; margin-top: 2px; }

    .gmaps-btn {
      display: block; text-align: center; background: #1a73e8; color: white;
      text-decoration: none; padding: 12px; border-radius: 8px;
      font-weight: 600; font-size: 0.9em; margin-top: 16px;
    }
    .gmaps-btn:hover { background: #1558b0; }

    .error-box {
      background: #fdecea; border: 1px solid #f5c6c6; border-radius: 8px;
      padding: 16px; color: #c62828; margin: 16px; font-size: 0.9em; line-height: 1.5;
    }
    .error-box code { font-size: 0.85em; background: #fff3f3; padding: 2px 5px; border-radius: 3px; }

    #map { height: 100vh; }

    .legend {
      background: white; padding: 10px 14px; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2); font-size: 0.82em;
    }
    .legend h4 { margin-bottom: 7px; color: #333; font-size: 0.88em; }
    .leg-item { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
    .leg-line { width: 22px; height: 4px; border-radius: 2px; }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; grid-template-rows: auto 55vh; }
      #map { height: 55vh; }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>Équipage de covoiturage</h1>
      <div class="eq-id" id="eq-id-display"></div>
    </div>
    <div class="sidebar-body" id="sidebar-body"></div>
  </div>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ─── Décodeur polyline inline (format Google / Mapbox) ───────────────
function decodePoly(str) {
  if (!str) return [];
  var idx = 0, lat = 0, lng = 0, out = [];
  while (idx < str.length) {
    var b, shift = 0, result = 0;
    do { b = str.charCodeAt(idx++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
    lat += (result & 1) ? ~(result >> 1) : (result >> 1);
    shift = 0; result = 0;
    do { b = str.charCodeAt(idx++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
    lng += (result & 1) ? ~(result >> 1) : (result >> 1);
    out.push([lat / 1e5, lng / 1e5]);
  }
  return out;
}

// ─── Couleurs membres ────────────────────────────────────────────────
const COLORS   = ['#dc3545', '#fd7e14', '#198754', '#0d6efd'];
const BG       = ['#fdecea', '#fff3e0', '#e8f5e9', '#e3f2fd'];
const BD       = ['#f5c6c6', '#ffd699', '#a5d6a7', '#90caf9'];

// ─── Lecture des paramètres URL ──────────────────────────────────────
const P = new URLSearchParams(window.location.search);

function p(key, def) {
  return P.get(key) || def || '';
}

const eqId = p('eq_id');
const jours = p('jours');
const nb    = parseInt(p('nb', '4')) || 4;
const travLat = parseFloat(p('trav_lat')) || null;
const travLon = parseFloat(p('trav_lon')) || null;

// Lire les membres : m1_..., m2_..., etc.
const membres = [];
for (let n = 1; n <= nb; n++) {
  const lat = parseFloat(p(`m${n}_lat`));
  const lon = parseFloat(p(`m${n}_lon`));
  const name = p(`m${n}_name`);
  if (!name && (!isFinite(lat) || !isFinite(lon))) continue;
  membres.push({
    name:    name || `Membre ${n}`,
    email:   p(`m${n}_email`),
    service: p(`m${n}_service`),
    jours:   p(`m${n}_jours`),
    h_arr:   p(`m${n}_h_arr`),
    h_dep:   p(`m${n}_h_dep`),
    dist:    p(`m${n}_dist`),
    lat:     isFinite(lat) ? lat : null,
    lon:     isFinite(lon) ? lon : null,
    poly:    p(`m${n}_pv`),
  });
}

// ─── Initialisation carte ────────────────────────────────────────────
const map = L.map('map').setView([46.6, 1.9], 6);
L.tileLayer('https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19
}).addTo(map);

// ─── Icône cercle coloré ─────────────────────────────────────────────
function buildIcon(emoji, color) {
  return L.divIcon({
    html: `<div style="background:white;border:3px solid ${color};border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 2px 6px rgba(0,0,0,0.3)">${emoji}</div>`,
    className: '', iconSize: [32,32], iconAnchor: [16,16], popupAnchor: [0,-18]
  });
}

// ─── Affichage ───────────────────────────────────────────────────────
document.getElementById('eq-id-display').textContent = eqId || `Équipage ${membres.length} membres`;

if (membres.length === 0) {
  document.getElementById('sidebar-body').innerHTML = `
    <div class="error-box">
      <strong>Aucun membre à afficher.</strong><br>
      Ce lien doit être généré automatiquement par le script DiagMob.<br>
      Format URL attendu :<br>
      <code>?eq_id=COV-C01-01&jours=lundi&nb=2&m1_name=Alice&m1_lat=48.8&m1_lon=2.3&...</code>
    </div>`;
} else {
  const bounds = L.latLngBounds([]);
  const legendItems = [];
  const sidebarParts = [];

  // Badge jours communs
  if (jours) {
    sidebarParts.push(`<div class="jours-badge">
      <span class="lbl">Jours en commun</span>
      <span class="val">${jours}</span>
    </div>`);
  }

  // Marqueur lieu de travail
  if (isFinite(travLat) && isFinite(travLon) && travLat && travLon) {
    L.marker([travLat, travLon], { icon: buildIcon('🏢', '#555') })
      .addTo(map)
      .bindPopup('<strong>🏢 Lieu de travail partagé</strong>');
    bounds.extend([travLat, travLon]);
  }

  // Waypoints Google Maps
  const gWaypoints = [];

  membres.forEach((m, i) => {
    const color = COLORS[i % COLORS.length];
    const bg    = BG[i % BG.length];
    const bd    = BD[i % BD.length];

    // Trajet voiture (polyline)
    if (m.poly) {
      try {
        const coords = decodePoly(m.poly);
        if (coords.length > 1) {
          const line = L.polyline(coords, { color, weight: 5, opacity: 0.75 }).addTo(map);
          bounds.extend(line.getBounds());
          legendItems.push({ color, label: 'Trajet ' + m.name.split(' ')[0] });
        }
      } catch(e) { /* polyline invalide */ }
    }

    // Marqueur domicile
    if (m.lat && m.lon) {
      L.marker([m.lat, m.lon], { icon: buildIcon('🏠', color) })
        .addTo(map)
        .bindPopup(`<div style="font-size:0.9em;line-height:1.6">
          <strong style="color:${color}">🏠 ${m.name}</strong><br>
          ${m.email ? m.email + '<br>' : ''}
          ${m.service ? '<em>' + m.service + '</em><br>' : ''}
          📅 ${m.jours || 'N/A'}<br>
          🕐 Arrivée ${m.h_arr || 'N/A'} · Départ ${m.h_dep || 'N/A'}
        </div>`);
      bounds.extend([m.lat, m.lon]);
      gWaypoints.push(`${m.lat.toFixed(5)},${m.lon.toFixed(5)}`);
    }

    // Card dans sidebar
    sidebarParts.push(`
      <div class="membre-card" style="border-color:${bd};background:${bg}">
        <div class="name"><span class="dot" style="background:${color}"></span>${m.name}</div>
        ${m.email ? `<div class="email">${m.email}</div>` : ''}
        <div class="infos">
          <div class="info-item" style="grid-column:1/-1">
            <div class="k">Jours sur site</div>
            <div class="v">${m.jours || 'N/A'}</div>
          </div>
          <div class="info-item">
            <div class="k">Arrivée</div>
            <div class="v">${m.h_arr || 'N/A'}</div>
          </div>
          <div class="info-item">
            <div class="k">Départ</div>
            <div class="v">${m.h_dep || 'N/A'}</div>
          </div>
          ${m.service ? `<div class="info-item" style="grid-column:1/-1"><div class="k">Service</div><div class="v">${m.service}</div></div>` : ''}
          ${m.dist    ? `<div class="info-item" style="grid-column:1/-1"><div class="k">Distance domicile–travail</div><div class="v">${m.dist} km</div></div>` : ''}
        </div>
      </div>`);
  });

  // Bouton Google Maps
  if (travLat && travLon) gWaypoints.push(`${travLat.toFixed(5)},${travLon.toFixed(5)}`);
  if (gWaypoints.length >= 2) {
    const gUrl = `https://www.google.com/maps/dir/${gWaypoints.join('/')}`;
    sidebarParts.push(`<a class="gmaps-btn" href="${gUrl}" target="_blank" rel="noopener">🗺️ Ouvrir sur Google Maps</a>`);
  }

  document.getElementById('sidebar-body').innerHTML = sidebarParts.join('');

  if (bounds.isValid()) map.fitBounds(bounds, { padding: [50, 50] });

  // Légende
  if (legendItems.length > 0) {
    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = () => {
      const div = L.DomUtil.create('div', 'legend');
      div.innerHTML = '<h4>Trajets voiture</h4>';
      legendItems.forEach(({ color, label }) => {
        div.innerHTML += `<div class="leg-item"><div class="leg-line" style="background:${color}"></div><span>${label}</span></div>`;
      });
      div.innerHTML += `<div class="leg-item" style="margin-top:5px"><span>🏠</span><span>Domicile</span></div>
                        <div class="leg-item"><span>🏢</span><span>Lieu de travail</span></div>`;
      return div;
    };
    legend.addTo(map);
  }
}
</script>
</body>
</html>
